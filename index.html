<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Genifi Globe Reference 1440</title>
  <style>
    :root {
      --stage-w: 1440;
      --stage-h: 900;
      --bg: #f8faf7;
      --sage: #c8ded0;
      --line: rgba(96, 120, 112, 0.42);
      --card-bg: rgba(255, 255, 255, 0.78);
      --card-border: rgba(44, 64, 58, 0.12);
      --text: rgba(17, 30, 27, 0.92);
      --mint: #35c878;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f8faf7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 83%, rgba(92, 205, 139, 0.16), transparent 25%),
        radial-gradient(circle at 52% 48%, rgba(175, 222, 195, 0.28), transparent 48%),
        linear-gradient(135deg, #ffffff 0%, #f8faf6 46%, #edf5ed 100%);
    }

    #globe {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .orbit-back,
    .orbit-front {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .orbit-back {
      z-index: 1;
    }

    .orbit-front {
      z-index: 3;
    }

    .orbit-back path,
    .orbit-front path,
    .orbit-back ellipse,
    .orbit-front ellipse {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.35;
      stroke-dasharray: 8 10;
      stroke-linecap: round;
      filter: drop-shadow(0 2px 5px rgba(51, 83, 72, 0.08));
    }

    .orbit-motion {
      stroke: none;
      opacity: 0;
    }

    .marker-core {
      filter: drop-shadow(0 9px 18px rgba(24, 92, 60, 0.2));
    }

    .orbit-dot {
      filter: drop-shadow(0 8px 18px rgba(53, 200, 120, 0.26));
    }

    .orbit-dot .dot-halo {
      fill: rgba(53, 200, 120, 0.12);
    }

    .orbit-dot .dot-core {
      fill: var(--mint);
    }

    .card {
      position: absolute;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 0 16px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--card-bg);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        0 18px 42px rgba(23, 45, 38, 0.1),
        0 2px 8px rgba(23, 45, 38, 0.07);
      color: var(--text);
      font-size: 15px;
      line-height: 1;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(8px) scale(0.98);
      backdrop-filter: blur(18px) saturate(1.08);
    }

    .card svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.75;
      fill: none;
    }

    .card-bank {
      left: 72px;
      top: 236px;
      animation: cardBank 20s ease-in-out infinite;
    }

    .card-issuer {
      left: 62px;
      top: 386px;
      animation: cardIssuer 20s ease-in-out infinite;
    }

    .card-fx {
      left: 224px;
      top: 544px;
      animation: cardFx 20s ease-in-out infinite;
    }

    .card-stable {
      left: 640px;
      top: 660px;
      animation: cardStable 20s ease-in-out infinite;
    }

    .card-payout {
      left: 1044px;
      top: 558px;
      animation: cardPayout 20s ease-in-out infinite;
    }

    .floor-glow {
      position: absolute;
      left: 50%;
      bottom: 86px;
      z-index: 0;
      width: 720px;
      height: 130px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 48%, rgba(98, 207, 139, 0.24), rgba(145, 210, 164, 0.14) 42%, transparent 74%),
        radial-gradient(ellipse at 50% 66%, rgba(57, 113, 75, 0.1), transparent 66%);
      filter: blur(34px);
      transform: translateX(-50%);
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 5;
      opacity: 0.22;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 73, 62, 0.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 50%, black 0%, black 50%, transparent 82%);
    }

    @keyframes cardGlow {
      0%, 100% {
        border-color: var(--card-border);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.92),
          0 18px 42px rgba(23, 45, 38, 0.1),
          0 2px 8px rgba(23, 45, 38, 0.07);
      }
      35%, 65% {
        border-color: rgba(53, 200, 120, 0.32);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.96),
          0 18px 42px rgba(23, 45, 38, 0.12),
          0 0 32px rgba(53, 200, 120, 0.18);
      }
    }

    @keyframes cardBank {
      0%, 15%, 100% { opacity: 0; transform: translateY(8px) scale(0.98); }
      3%, 11% { opacity: 1; transform: translateY(0) scale(1); animation-timing-function: ease-out; }
    }

    @keyframes cardIssuer {
      0%, 18%, 35%, 100% { opacity: 0; transform: translateY(8px) scale(0.98); }
      22%, 30% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardFx {
      0%, 38%, 55%, 100% { opacity: 0; transform: translateY(8px) scale(0.98); }
      42%, 50% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardStable {
      0%, 58%, 75%, 100% { opacity: 0; transform: translateY(8px) scale(0.98); }
      62%, 70% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardPayout {
      0%, 78%, 95%, 100% { opacity: 0; transform: translateY(8px) scale(0.98); }
      82%, 90% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-bank,
    .card-issuer,
    .card-fx,
    .card-stable,
    .card-payout {
      animation-name: cardBank, cardGlow;
      animation-duration: 20s, 20s;
      animation-timing-function: ease-in-out, ease-in-out;
      animation-iteration-count: infinite, infinite;
    }

    .card-issuer { animation-name: cardIssuer, cardGlow; }
    .card-fx { animation-name: cardFx, cardGlow; }
    .card-stable { animation-name: cardStable, cardGlow; }
    .card-payout { animation-name: cardPayout, cardGlow; }
  </style>
</head>
<body>
  <div class="stage">
    <svg class="orbit-back" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
      <path d="M168.9 407.3 C187.7 272.9 451.3 184.2 757.6 209.2 C1063.9 234.1 1297.1 363.2 1278.3 497.7"></path>
    </svg>

    <div id="globe" aria-hidden="true"></div>

    <svg class="orbit-front" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
      <path class="orbit-motion" id="route-motion" d="M168.9 407.3 C187.7 272.9 451.3 184.2 757.6 209.2 C1063.9 234.1 1297.1 363.2 1278.3 497.7 C1259.5 632.1 995.9 720.8 689.6 695.8 C383.3 670.9 150.1 541.8 168.9 407.3Z"></path>
      <path id="visible-route" d="M1278.3 497.7 C1259.5 632.1 995.9 720.8 689.6 695.8 C383.3 670.9 150.1 541.8 168.9 407.3"></path>
      <g class="orbit-dot">
        <animateMotion dur="16s" begin="-2s" repeatCount="indefinite" rotate="0" keyPoints="1;0" keyTimes="0;1">
          <mpath href="#route-motion"></mpath>
        </animateMotion>
        <animate attributeName="opacity" dur="16s" begin="-2s" repeatCount="indefinite" values="1;1;0;0;1;1" keyTimes="0;0.58;0.62;0.84;0.88;1"></animate>
        <circle class="dot-halo" cx="0" cy="0" r="24"></circle>
        <circle class="dot-core" cx="0" cy="0" r="6"></circle>
      </g>
      <g class="orbit-dot">
        <animateMotion dur="23s" begin="-9s" repeatCount="indefinite" rotate="0" keyPoints="1;0" keyTimes="0;1">
          <mpath href="#route-motion"></mpath>
        </animateMotion>
        <animate attributeName="opacity" dur="23s" begin="-9s" repeatCount="indefinite" values="1;1;0;0;1;1" keyTimes="0;0.58;0.62;0.84;0.88;1"></animate>
        <circle class="dot-halo" cx="0" cy="0" r="20"></circle>
        <circle class="dot-core" cx="0" cy="0" r="5"></circle>
      </g>
      <g class="orbit-dot">
        <animateMotion dur="31s" begin="-17s" repeatCount="indefinite" rotate="0" keyPoints="1;0" keyTimes="0;1">
          <mpath href="#route-motion"></mpath>
        </animateMotion>
        <animate attributeName="opacity" dur="31s" begin="-17s" repeatCount="indefinite" values="1;1;0;0;1;1" keyTimes="0;0.58;0.62;0.84;0.88;1"></animate>
        <circle class="dot-halo" cx="0" cy="0" r="18"></circle>
        <circle class="dot-core" cx="0" cy="0" r="4.5"></circle>
      </g>
      <g class="marker-core">
        <animateMotion dur="20s" repeatCount="indefinite" rotate="0" keyPoints="1;0.82;0.62;0.42;0.2;0" keyTimes="0;0.2;0.4;0.6;0.8;1" calcMode="spline" keySplines=".42 0 .2 1;.42 0 .2 1;.42 0 .2 1;.42 0 .2 1;.42 0 .2 1">
          <mpath href="#route-motion"></mpath>
        </animateMotion>
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" values="1;1;0;0;1;1" keyTimes="0;0.58;0.62;0.84;0.88;1"></animate>
        <circle cx="0" cy="0" r="24" fill="rgba(53,200,120,0.12)"></circle>
        <circle cx="0" cy="0" r="15" fill="rgba(8,31,22,0.86)" stroke="rgba(53,200,120,0.56)" stroke-width="1.1"></circle>
        <image href="genifi-mark.png" x="-11" y="-11" width="22" height="22" preserveAspectRatio="xMidYMid meet"></image>
      </g>
    </svg>

    <div class="card card-bank">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c2.4 2.5 3.6 5.5 3.6 9s-1.2 6.5-3.6 9M12 3C9.6 5.5 8.4 8.5 8.4 12s1.2 6.5 3.6 9"></path></svg>
      <span>Global Banking Rails</span>
    </div>
    <div class="card card-issuer">
      <svg viewBox="0 0 24 24"><path d="M4 20h16M6 10v8M10 10v8M14 10v8M18 10v8M3 10h18L12 4 3 10Z"></path></svg>
      <span>Issuer Access</span>
    </div>
    <div class="card card-fx">
      <svg viewBox="0 0 24 24"><path d="M20 8a7 7 0 0 0-12.4-3.6L5 7M4 16a7 7 0 0 0 12.4 3.6L19 17M5 7h5M19 17h-5"></path></svg>
      <span>FX Routing</span>
    </div>
    <div class="card card-stable">
      <svg viewBox="0 0 24 24"><path d="m12 3 8 4-8 4-8-4 8-4ZM4 12l8 4 8-4M4 17l8 4 8-4"></path></svg>
      <span>Stablecoin Rail</span>
    </div>
    <div class="card card-payout">
      <svg viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"></path></svg>
      <span>Cross-Border Payout</span>
    </div>

    <div class="floor-glow"></div>
    <div class="grain"></div>
  </div>

  <script src="https://unpkg.com/globe.gl"></script>
  <script type="module">
    import {
      AdditiveBlending,
      AmbientLight,
      BackSide,
      CanvasTexture,
      Color,
      DirectionalLight,
      DoubleSide,
      HemisphereLight,
      MeshBasicMaterial,
      MeshPhysicalMaterial,
      PointLight,
      RepeatWrapping,
      SphereGeometry,
      Mesh
    } from "https://esm.sh/three";
    import * as topojson from "https://esm.sh/topojson-client";

    const globeElement = document.getElementById("globe");
    const globe = Globe()(globeElement)
      .backgroundColor("rgba(0, 0, 0, 0)")
      .showGlobe(false)
      .showAtmosphere(false);

    const scene = globe.scene();
    scene.add(new AmbientLight("#d9eadb", 0.9));

    const keyLight = new DirectionalLight("#d7ebdc", 0.72);
    keyLight.position.set(-230, 34, 210);
    scene.add(keyLight);

    const fillLight = new DirectionalLight("#a7d6b8", 0.72);
    fillLight.position.set(150, -60, 130);
    scene.add(fillLight);

    const rimLight = new PointLight("#74d89d", 1.15, 420);
    rimLight.position.set(-120, -150, 230);
    scene.add(rimLight);

    const hemiLight = new HemisphereLight("#e5f2e5", "#b4d4bd", 0.68);
    scene.add(hemiLight);

    const createMicroTexture = () => {
      const canvas = document.createElement("canvas");
      const size = 1024;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#bdd7c6";
      ctx.fillRect(0, 0, size, size);

      for (let i = 0; i < 3600; i += 1) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const radius = 3 + Math.random() * 22;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.08 + Math.random() * 0.15})`;
        ctx.lineWidth = 0.4 + Math.random() * 0.85;
        ctx.arc(x, y, radius, Math.random() * Math.PI, Math.random() * Math.PI + Math.PI);
        ctx.stroke();
      }

      for (let i = 0; i < 2600; i += 1) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const length = 10 + Math.random() * 54;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(36, 102, 72, ${0.026 + Math.random() * 0.064})`;
        ctx.lineWidth = 0.3 + Math.random() * 0.55;
        ctx.moveTo(x, y);
        ctx.bezierCurveTo(
          x + Math.random() * length,
          y - Math.random() * length,
          x - Math.random() * length,
          y + Math.random() * length,
          x + Math.random() * length * 0.4,
          y + Math.random() * length * 0.5
        );
        ctx.stroke();
      }

      const texture = new CanvasTexture(canvas);
      texture.wrapS = RepeatWrapping;
      texture.wrapT = RepeatWrapping;
      texture.repeat.set(2.4, 1.2);
      return texture;
    };

    const microTexture = createMicroTexture();

    const milkGlassSurface = new Mesh(
      new SphereGeometry(99.7, 160, 160),
      new MeshPhysicalMaterial({
        color: new Color("#cbe4d2"),
        roughness: 0.82,
        metalness: 0.02,
        transmission: 0,
        thickness: 0.72,
        transparent: false,
        opacity: 1,
        clearcoat: 0.3,
        clearcoatRoughness: 0.9,
        sheen: 0.28,
        sheenRoughness: 0.88,
        sheenColor: new Color("#f3fff5"),
        specularIntensity: 0.16,
        specularColor: new Color("#f6fff7"),
        bumpMap: microTexture,
        bumpScale: 0.42
      })
    );
    scene.add(milkGlassSurface);

    fetch("https://cdn.jsdelivr.net/npm/world-atlas/land-110m.json")
      .then((res) => res.json())
      .then((landTopo) => {
        const land = topojson.feature(landTopo, landTopo.objects.land).features;

        globe
          .polygonsData(land)
          .polygonAltitude(0.012)
          .polygonCapMaterial(new MeshPhysicalMaterial({
            color: new Color("#8bc6a1"),
            transparent: true,
            opacity: 0.36,
            roughness: 0.88,
            clearcoat: 0.18,
            clearcoatRoughness: 0.96,
            side: DoubleSide,
            bumpMap: microTexture,
            bumpScale: 0.18
          }))
          .polygonSideColor(() => "rgba(0,0,0,0)")
          .polygonStrokeColor(() => "rgba(53,124,89,0.42)");
      });

    const innerGlow = new Mesh(
      new SphereGeometry(100.2, 64, 64),
      new MeshBasicMaterial({
        color: new Color("#d9f0df"),
        transparent: true,
        opacity: 0.035,
        side: BackSide,
        blending: AdditiveBlending,
        depthWrite: false
      })
    );
    scene.add(innerGlow);

    const outerShell = new Mesh(
      new SphereGeometry(100.4, 64, 64),
      new MeshBasicMaterial({
        color: new Color("#d6ecdd"),
        transparent: true,
        opacity: 0.026,
        wireframe: false,
        blending: AdditiveBlending,
        depthWrite: false
      })
    );
    scene.add(outerShell);

    globe.pointOfView({ lat: 22, lng: 16, altitude: 1.94 }, 0);

    const controls = globe.controls();
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.2;
    controls.enableZoom = true;
    controls.enablePan = false;
    controls.rotateSpeed = 0.22;
    controls.zoomSpeed = 0.6;
    controls.minDistance = 170;
    controls.maxDistance = 520;

    const resize = () => {
      const rect = globeElement.getBoundingClientRect();
      globe.width(rect.width);
      globe.height(rect.height);
    };

    window.addEventListener("resize", resize);
    resize();
  </script>
</body>
</html>
